<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<title id="tituloProducto">Detalle del Producto</title>

<meta name="description" id="metaDescripcion" content="Detalle del producto">

<link rel="stylesheet" href="css/estilos.css">

</head>

<body>

<!-- HEADER -->

<header>

<nav>

<div class="logo">
    <img src="img/logo labsupply.png">
</div>

<ul>

<li><a href="index.html">Inicio</a></li>
<li><a href="productos.html">Productos</a></li>
<li><a href="blog.html">Blog</a></li>
<li><a href="descargas.html">Descargas</a></li>
<li><a href="contacto.html">Contacto</a></li>
<li>
<a href="cotizacion.html" class="link-cotizacion">

    <span>Cotización</span>

    <div class="icono-cotizacion">
        <i class="fa-solid fa-clipboard-check"></i>
        <i class="fa-solid fa-calculator"></i>
    </div>

    <span id="contadorCotizacion">0</span>

</a>
</li>

</ul>

</nav>


</header>

<!-- DETALLE PRODUCTO -->

<section class="detalleProducto">

<div class="productoContainer">

<!-- IMAGEN -->

<div class="productoImagen">

<img id="imagenProducto" src="" alt="Producto laboratorio">

</div>

<!-- INFORMACION -->

<div class="productoInfo">

<h2 id="nombreProducto"></h2>

<p class="categoria">
<strong>Categoría:</strong>
<span id="categoriaProducto"></span>
</p>

<p class="marca">
<strong>Marca:</strong>
<span id="marcaProducto"></span>
</p>

<p class="descripcion" id="descripcionProducto"></p>

<div class="accionesProducto">

<a id="pdfProducto" class="btn" target="_blank">
Descargar ficha técnica
</a>

<button id="btnCotizar">
Cotizar
</button>

</div>

<!-- SEO KEYWORDS (ocultas para buscadores) -->

<div class="keywords" style="display:none">

<span id="keywordsProducto"></span>

</div>

</div>

</div>

</section>

<!-- PRODUCTOS RELACIONADOS -->

<section class="relacionados">

<h2>Productos relacionados</h2>

<div id="productosRelacionados" class="gridProductos">

</div>

</section>

<!-- FOOTER -->

<footer>

<p>

Lab Supply © 2026 Laboratorio | Todos los derechos reservados

</p>

</footer>


<!-- BOTON WHATSAPP -->

<a 
href="https://wa.me/593XXXXXXXXX?text=Hola,%20deseo%20información%20sobre%20sus%20productos%20de%20laboratorio"
class="btnWhatsAppFlotante"
target="_blank"
>

<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">

</a>

<!-- Ventana Modal -->

<div id="modalProducto" class="modal">

<div class="modal-contenido">

<span class="cerrar" onclick="cerrarProducto()">×</span>

<div class="modal-grid">

<!-- IMAGEN -->

<div class="modal-imagen">

<img id="modalImagen">

<h2 id="modalNombre"></h2>

<p id="modalMarca"></p>

</div>

<!-- CONTENIDO -->

<div class="modal-info">

<ul class="tabs">

<li onclick="mostrarTab('detalle')" class="tab-activo">
Detalle
</li>

<li onclick="mostrarTab('especificaciones')">
Especificaciones
</li>

<li onclick="mostrarTab('categoria')">
Categoría
</li>

</ul>

<div class="tab-contenido">

<div id="detalle" class="tab">
<p id="modalDescripcion"></p>
</div>

<div id="especificaciones" class="tab">
<p id="modalEspecificaciones"></p>
</div>

<div id="categoria" class="tab">
<p id="modalCategoria"></p>
</div>

</div>

</div>

</div>

</div>

</div>

<!-- CONTENEDOR DE ALERTAS -->
<div id="toastContainer" class="toast-container"></div>

<!-- JS -->

<script src="js/catalogo.js"></script>
<script src="js/producto.js"></script>
<script src="js/carrito.js"></script>

</body>

</html>
