<h2>Panel de Administración de Productos</h2>

<!-- BUSCADOR -->

<input
type="text"
id="buscarAdmin"
placeholder="Buscar producto..."
>

<!-- FORMULARIO -->

<form id="formProducto">

<input type="hidden" id="productoIndex">

<input type="text" id="nombre" placeholder="Nombre" required>

<input type="text" id="categoria" placeholder="Categoria" required>

<input type="text" id="marca" placeholder="Marca">

<input type="text" id="keywords" placeholder="Keywords SEO">

<textarea id="descripcion" placeholder="Descripción"></textarea>

<input type="file" id="imagen">

<input type="text" id="pdf" placeholder="PDF">

<button type="submit">
Guardar producto
</button>

</form>

<hr>

<table>

<thead>

<tr>

<th>Nombre</th>
<th>Marca</th>
<th>Categoría</th>
<th>Acciones</th>

</tr>

</thead>

<tbody id="listaAdmin"></tbody>

</table>

<button onclick="exportarJSON()">
Exportar productos.json
</button>
